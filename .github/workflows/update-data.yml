name: Update mandi data

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour
  workflow_dispatch:        # allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest mandi data
        run: python scripts/fetch_data.py
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}

      - name: Report data stats
        run: python scripts/report_stats.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --staged --quiet || git commit -m "Update mandi data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
